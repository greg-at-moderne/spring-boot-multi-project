build:
  partitions:
    - name: root
      steps:
        - type: gradle
          inclusion: |-
            **/*
            !domain/**
            !api/**
            !persistence/**
            !service/**
            !web/**
        - type: resource
          inclusion: |-
            **/*
            !domain/**
            !api/**
            !persistence/**
            !service/**
            !web/**
    - name: domain
      steps:
        - type: gradle
          inclusion: |-
            domain/**
        - type: resource
          inclusion: |-
            domain/**
    - name: api
      steps:
        - type: gradle
          inclusion: |-
            api/**
        - type: resource
          inclusion: |-
            api/**
    - name: persistence
      steps:
        - type: gradle
          inclusion: |-
            persistence/**
        - type: resource
          inclusion: |-
            persistence/**
    - name: service
      steps:
        - type: gradle
          inclusion: |-
            service/**
        - type: resource
          inclusion: |-
            service/**
    - name: web
      steps:
        - type: gradle
          inclusion: |-
            web/**
        - type: resource
          inclusion: |-
            web/**
