name: Spring Boot 3.5 Upgrade

on:
  push:
  workflow_dispatch:

env:
  MODERNE_CLI_VERSION: "4.1.8"
  REWRITE_SPRING_VERSION: "0.31.0"

jobs:
  upgrade:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Moderne CLI (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sSL -o mod.jar https://repo1.maven.org/maven2/io/moderne/moderne-cli/${{ env.MODERNE_CLI_VERSION }}/moderne-cli-${{ env.MODERNE_CLI_VERSION }}.jar
          echo '#!/bin/bash' > mod
          echo 'java -jar '"$GITHUB_WORKSPACE"'/mod.jar "$@"' >> mod
          chmod +x mod
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Install Moderne CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/io/moderne/moderne-cli/${{ env.MODERNE_CLI_VERSION }}/moderne-cli-${{ env.MODERNE_CLI_VERSION }}.jar" -OutFile mod.jar
          @"
          @echo off
          java -jar "${{ github.workspace }}\mod.jar" %*
          "@ | Set-Content -Path mod.cmd
          echo "${{ github.workspace }}" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

      - name: Configure CLI to use JDK 17
        run: mod config java version edit 17

      - name: Install recipe dependencies
        run: mod config recipes jar install io.moderne.recipe:rewrite-spring:${{ env.REWRITE_SPRING_VERSION }}

      - name: Build LSTs
        run: mod build . --no-download

      - name: Run Spring Boot 3.5 upgrade recipe
        run: mod run . --recipe io.moderne.java.spring.boot3.UpgradeSpringBoot_3_5

      - name: Apply recipe changes
        run: mod git apply . --last-recipe-run

      - name: Rebuild LSTs
        run: mod build . --no-download

      - name: Verify changes with build tool
        run: mod exec . --last-recipe-run -- $MODERNE_BUILD_TOOL_CHECK

      - name: Upload Moderne build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moderne-build-logs-${{ matrix.os }}
          path: .moderne/build/**
          if-no-files-found: ignore
