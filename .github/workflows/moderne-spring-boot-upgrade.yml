name: Spring Boot 3.5 Upgrade

on:
  push:
  workflow_dispatch:

env:
  MODERNE_CLI_DEV_VERSION: "4.3.0-SNAPSHOT"
  REWRITE_SPRING_VERSION: "0.31.0"

jobs:
  upgrade:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Checkout Moderne CLI
        uses: actions/checkout@v4
        with:
          repository: moderneinc/moderne-cli
          path: moderne-cli

      - name: Build Moderne CLI dev fat jar
        working-directory: moderne-cli
        run: ./gradlew devFatJar

      - name: Install Moderne CLI wrapper
        run: |
          echo '#!/bin/bash' > mod
          echo 'java -jar '"$GITHUB_WORKSPACE"'/moderne-cli/mod/build/libs/mod-${{ env.MODERNE_CLI_DEV_VERSION }}-dev-fat.jar "$@"' >> mod
          chmod +x mod
          echo "$GITHUB_WORKSPACE" >> $GITHUB_PATH

      - name: Configure CLI to use JDK 17
        run: mod config java version edit 17

      - name: Install recipe dependencies
        run: mod config recipes jar install io.moderne.recipe:rewrite-spring:${{ env.REWRITE_SPRING_VERSION }}

      - name: Build LSTs
        run: mod build . --no-download

      - name: Run Spring Boot 3.5 upgrade recipe
        run: mod run . --recipe io.moderne.java.spring.boot3.UpgradeSpringBoot_3_5

      - name: Apply recipe changes
        run: mod git apply . --last-recipe-run

      - name: Rebuild LSTs
        run: mod build . --no-download

      - name: Verify changes with build tool
        run: mod exec . --last-recipe-run -- $MODERNE_BUILD_TOOL_CHECK

      - name: Upload Moderne build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: moderne-build-logs-${{ matrix.os }}
          path: .moderne/build/**
          if-no-files-found: ignore

      - name: Upload Moderne logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: moderne-logs-${{ matrix.os }}
          path: .moderne/*/*.log
          if-no-files-found: ignore
