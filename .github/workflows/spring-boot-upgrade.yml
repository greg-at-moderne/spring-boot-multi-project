name: Spring Boot 3.5 Upgrade

on:
  push:

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Moderne CLI
        run: |
          VERSION=$(curl -s https://repo1.maven.org/maven2/io/moderne/moderne-cli/maven-metadata.xml \
            | grep '<release>' | sed 's/.*<release>\(.*\)<\/release>.*/\1/')
          curl -s "https://repo1.maven.org/maven2/io/moderne/moderne-cli/${VERSION}/moderne-cli-${VERSION}.jar" \
            --output "${{ runner.temp }}/mod.jar"
          printf '#!/bin/bash\njava -jar "%s" "$@"\n' "${{ runner.temp }}/mod.jar" > "${{ runner.temp }}/mod"
          chmod +x "${{ runner.temp }}/mod"
          echo "${{ runner.temp }}" >> "$GITHUB_PATH"

      - name: Install recipe dependencies
        run: mod config recipes jar install io.moderne.recipe:rewrite-spring:LATEST

      - name: Build LSTs
        run: mod build .

      - name: Run Spring Boot 3.5 upgrade recipe
        run: mod run . --recipe io.moderne.java.spring.boot3.UpgradeSpringBoot_3_5

      - name: Apply recipe changes
        run: mod git apply . --last-recipe-run

      - name: Verify changes with build tool
        run: mod exec . --last-recipe-run -- $MODERNE_BUILD_TOOL_CHECK
